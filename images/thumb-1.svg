<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <rect width="200" height="150" fill="#eeecea"/>

  <!-- Phone frame -->
  <rect x="68" y="12" width="64" height="126" rx="8" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.5"/>
  <!-- Screen area -->
  <rect x="73" y="22" width="54" height="106" rx="3" fill="#f7f5f2"/>
  <!-- Notch -->
  <rect x="86" y="14" width="28" height="5" rx="2.5" fill="#dddbd8"/>

  <!-- App header bar -->
  <rect x="73" y="22" width="54" height="14" rx="0" fill="#1a1a1a"/>
  <rect x="78" y="27" width="20" height="2" rx="1" fill="#ffffff" opacity="0.7"/>

  <!-- Item row 1 - original -->
  <rect x="76" y="40" width="48" height="18" rx="2" fill="#dddbd8" opacity="0.4"/>
  <rect x="80" y="44" width="14" height="10" rx="1.5" fill="#dddbd8"/>
  <rect x="97" y="45" width="20" height="2.5" rx="1" fill="#888580"/>
  <rect x="97" y="50" width="13" height="2" rx="1" fill="#dddbd8"/>

  <!-- Arrow / swap indicator -->
  <rect x="85" y="62" width="30" height="1.5" rx="0.75" fill="#dddbd8"/>
  <text x="100" y="61" font-family="Inter, sans-serif" font-size="8" fill="#888580" text-anchor="middle">substitute</text>

  <!-- Item row 2 - replacement -->
  <rect x="76" y="68" width="48" height="18" rx="2" fill="#1a1a1a" opacity="0.06"/>
  <rect x="80" y="72" width="14" height="10" rx="1.5" fill="#1a1a1a" opacity="0.15"/>
  <rect x="97" y="73" width="20" height="2.5" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <rect x="97" y="78" width="13" height="2" rx="1" fill="#dddbd8"/>
  <!-- Checkmark badge -->
  <circle cx="119" cy="72" r="4" fill="#1a1a1a" opacity="0.7"/>
  <polyline points="116.5,72 118,73.5 121.5,70.5" fill="none" stroke="#f7f5f2" stroke-width="1.2" stroke-linecap="round"/>

  <!-- CTA button -->
  <rect x="76" y="92" width="48" height="11" rx="2" fill="#1a1a1a"/>
  <rect x="88" y="95.5" width="24" height="4" rx="1" fill="#f7f5f2" opacity="0.7"/>

  <!-- Bottom nav hint -->
  <rect x="88" y="120" width="24" height="2" rx="1" fill="#dddbd8"/>
</svg>
