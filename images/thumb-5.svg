<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <rect width="200" height="150" fill="#eeecea"/>

  <!-- Component grid header -->
  <rect x="18" y="14" width="164" height="122" rx="4" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.5"/>

  <!-- Top label row -->
  <rect x="24" y="20" width="24" height="3" rx="1" fill="#888580" opacity="0.6"/>
  <rect x="88" y="20" width="18" height="3" rx="1" fill="#dddbd8"/>
  <rect x="124" y="20" width="14" height="3" rx="1" fill="#dddbd8"/>
  <rect x="154" y="20" width="20" height="3" rx="1" fill="#dddbd8"/>

  <!-- Divider -->
  <rect x="18" y="27" width="164" height="1" fill="#dddbd8"/>

  <!-- Row 1: Buttons -->
  <rect x="24" y="33" width="30" height="3" rx="1" fill="#888580" opacity="0.5"/>
  <!-- Button variants -->
  <rect x="80" y="30" width="30" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="118" y="30" width="28" height="10" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <rect x="152" y="30" width="22" height="10" rx="2" fill="#dddbd8" opacity="0.4"/>

  <!-- Row 2: Inputs -->
  <rect x="18" y="45" width="164" height="1" fill="#dddbd8" opacity="0.5"/>
  <rect x="24" y="50" width="24" height="3" rx="1" fill="#888580" opacity="0.5"/>
  <rect x="80" y="47" width="52" height="10" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <rect x="84" y="51" width="24" height="2" rx="1" fill="#dddbd8"/>
  <rect x="140" y="47" width="32" height="10" rx="2" fill="none" stroke="#dddbd8" stroke-width="1"/>
  <rect x="144" y="51" width="20" height="2" rx="1" fill="#dddbd8" opacity="0.6"/>

  <!-- Row 3: Cards -->
  <rect x="18" y="62" width="164" height="1" fill="#dddbd8" opacity="0.5"/>
  <rect x="24" y="67" width="20" height="3" rx="1" fill="#888580" opacity="0.5"/>
  <!-- Mini card -->
  <rect x="80" y="64" width="44" height="28" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="84" y="68" width="36" height="12" rx="1" fill="#dddbd8" opacity="0.4"/>
  <rect x="84" y="84" width="22" height="2.5" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <rect x="84" y="88" width="30" height="2" rx="1" fill="#dddbd8"/>
  <!-- Mini card 2 -->
  <rect x="130" y="64" width="44" height="28" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="134" y="68" width="36" height="12" rx="1" fill="#1a1a1a" opacity="0.1"/>
  <rect x="134" y="84" width="22" height="2.5" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <rect x="134" y="88" width="30" height="2" rx="1" fill="#dddbd8"/>

  <!-- Row 4: Tokens / color swatches -->
  <rect x="18" y="97" width="164" height="1" fill="#dddbd8" opacity="0.5"/>
  <rect x="24" y="103" width="22" height="3" rx="1" fill="#888580" opacity="0.5"/>
  <circle cx="90" cy="108" r="6" fill="#1a1a1a"/>
  <circle cx="106" cy="108" r="6" fill="#888580"/>
  <circle cx="122" cy="108" r="6" fill="#dddbd8"/>
  <circle cx="138" cy="108" r="6" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <circle cx="154" cy="108" r="6" fill="#eeecea" stroke="#dddbd8" stroke-width="1"/>

  <!-- Row 5: Typography -->
  <rect x="18" y="119" width="164" height="1" fill="#dddbd8" opacity="0.5"/>
  <rect x="24" y="124" width="28" height="3" rx="1" fill="#888580" opacity="0.5"/>
  <rect x="80" y="122" width="50" height="6" rx="1" fill="#1a1a1a" opacity="0.4"/>
  <rect x="136" y="124" width="36" height="3" rx="1" fill="#1a1a1a" opacity="0.2"/>
</svg>
