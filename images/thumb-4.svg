<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <rect width="200" height="150" fill="#eeecea"/>

  <!-- Three screens showing onboarding steps -->

  <!-- Screen 1 (small, left) -->
  <rect x="22" y="30" width="42" height="72" rx="5" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.2"/>
  <rect x="27" y="38" width="32" height="46" rx="2" fill="#f7f5f2"/>
  <rect x="34" y="14" width="14" height="3" rx="1.5" fill="#dddbd8"/>
  <!-- Step 1 content -->
  <circle cx="43" cy="52" r="10" fill="#1a1a1a" opacity="0.08"/>
  <rect x="31" y="66" width="24" height="3" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <rect x="34" y="72" width="18" height="2" rx="1" fill="#dddbd8"/>
  <rect x="28" y="78" width="28" height="6" rx="1.5" fill="#1a1a1a" opacity="0.7"/>
  <!-- Step dot -->
  <circle cx="43" cy="106" r="3" fill="#1a1a1a" opacity="0.7"/>
  <rect x="48" y="104.5" width="6" height="1" rx="0.5" fill="#dddbd8"/>
  <circle cx="56" cy="106" r="2" fill="#dddbd8"/>
  <rect x="59" y="104.5" width="6" height="1" rx="0.5" fill="#dddbd8"/>
  <circle cx="66" cy="106" r="2" fill="#dddbd8"/>

  <!-- Arrow -->
  <text x="75" y="71" font-family="Inter, sans-serif" font-size="10" fill="#dddbd8">→</text>

  <!-- Screen 2 (main, center) -->
  <rect x="81" y="18" width="50" height="88" rx="6" fill="#f7f5f2" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="87" y="28" width="38" height="68" rx="2" fill="#f7f5f2"/>
  <rect x="92" y="10" width="18" height="4" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <!-- Step 2 content -->
  <circle cx="106" cy="48" r="13" fill="#1a1a1a" opacity="0.06"/>
  <rect x="93" y="66" width="26" height="3.5" rx="1" fill="#1a1a1a" opacity="0.4"/>
  <rect x="96" y="73" width="20" height="2.5" rx="1" fill="#dddbd8"/>
  <rect x="96" y="78" width="16" height="2.5" rx="1" fill="#dddbd8"/>
  <rect x="88" y="86" width="36" height="8" rx="2" fill="#1a1a1a"/>
  <!-- Step dots -->
  <circle cx="100" cy="112" r="2" fill="#dddbd8"/>
  <rect x="104" y="110.5" width="8" height="1" rx="0.5" fill="#dddbd8"/>
  <circle cx="114" cy="112" r="3.5" fill="#1a1a1a" opacity="0.7"/>
  <rect x="119" y="110.5" width="8" height="1" rx="0.5" fill="#dddbd8"/>
  <circle cx="129" cy="112" r="2" fill="#dddbd8"/>

  <!-- Arrow -->
  <text x="140" y="71" font-family="Inter, sans-serif" font-size="10" fill="#dddbd8">→</text>

  <!-- Screen 3 (small, right) -->
  <rect x="151" y="30" width="42" height="72" rx="5" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.2"/>
  <rect x="156" y="38" width="32" height="46" rx="2" fill="#f7f5f2"/>
  <rect x="164" y="14" width="14" height="3" rx="1.5" fill="#dddbd8"/>
  <!-- Step 3 content - success -->
  <circle cx="172" cy="52" r="10" fill="#1a1a1a" opacity="0.06"/>
  <polyline points="166,52 170,56 178,48" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <rect x="160" y="66" width="24" height="3" rx="1" fill="#1a1a1a" opacity="0.25"/>
  <rect x="162" y="72" width="20" height="2" rx="1" fill="#dddbd8"/>
  <rect x="157" y="78" width="28" height="6" rx="1.5" fill="#dddbd8"/>
</svg>
