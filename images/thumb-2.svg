<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <rect width="200" height="150" fill="#eeecea"/>

  <!-- Phone frame -->
  <rect x="68" y="12" width="64" height="126" rx="8" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.5"/>
  <rect x="73" y="22" width="54" height="106" rx="3" fill="#f7f5f2"/>
  <rect x="86" y="14" width="28" height="5" rx="2.5" fill="#dddbd8"/>

  <!-- Header -->
  <rect x="73" y="22" width="54" height="14" rx="0" fill="#f7f5f2" stroke-bottom="#dddbd8"/>
  <rect x="76" y="28" width="16" height="2" rx="1" fill="#1a1a1a" opacity="0.5"/>
  <rect x="117" y="27" width="8" height="4" rx="1" fill="#dddbd8"/>

  <!-- Progress steps -->
  <circle cx="84" cy="44" r="4" fill="#1a1a1a"/>
  <rect x="88" y="43" width="10" height="2" rx="1" fill="#dddbd8"/>
  <circle cx="102" cy="44" r="4" fill="#1a1a1a"/>
  <rect x="106" y="43" width="10" height="2" rx="1" fill="#dddbd8"/>
  <circle cx="120" cy="44" r="4" fill="#dddbd8"/>

  <!-- Cart summary card -->
  <rect x="76" y="52" width="48" height="28" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="80" y="57" width="14" height="10" rx="1.5" fill="#dddbd8"/>
  <rect x="97" y="58" width="18" height="2.5" rx="1" fill="#888580"/>
  <rect x="97" y="63" width="10" height="2" rx="1" fill="#dddbd8"/>
  <rect x="111" y="58" width="10" height="4" rx="1" fill="#1a1a1a" opacity="0.08"/>
  <rect x="80" y="70" width="40" height="1" rx="0.5" fill="#dddbd8"/>
  <rect x="80" y="74" width="12" height="2" rx="1" fill="#888580" opacity="0.6"/>
  <rect x="108" y="74" width="14" height="2" rx="1" fill="#1a1a1a" opacity="0.5"/>

  <!-- Payment section -->
  <rect x="76" y="84" width="48" height="8" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="79" y="87" width="6" height="2" rx="1" fill="#888580" opacity="0.6"/>
  <rect x="88" y="86" width="20" height="4" rx="1" fill="#dddbd8" opacity="0.6"/>

  <!-- CTA -->
  <rect x="76" y="97" width="48" height="12" rx="2" fill="#1a1a1a"/>
  <rect x="86" y="101.5" width="28" height="3" rx="1" fill="#f7f5f2" opacity="0.75"/>

  <!-- Bottom nav -->
  <rect x="88" y="120" width="24" height="2" rx="1" fill="#dddbd8"/>
</svg>
