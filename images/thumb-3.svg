<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <rect width="200" height="150" fill="#eeecea"/>

  <!-- Dashboard window -->
  <rect x="18" y="18" width="164" height="114" rx="4" fill="#f7f5f2" stroke="#dddbd8" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="18" y="18" width="164" height="16" rx="4" fill="#f0eeeb"/>
  <rect x="18" y="26" width="164" height="8" fill="#f0eeeb"/>
  <circle cx="28" cy="26" r="3" fill="#dddbd8"/>
  <circle cx="37" cy="26" r="3" fill="#dddbd8"/>
  <circle cx="46" cy="26" r="3" fill="#dddbd8"/>
  <rect x="82" y="23" width="36" height="6" rx="1" fill="#dddbd8" opacity="0.5"/>

  <!-- Sidebar -->
  <rect x="18" y="34" width="32" height="98" fill="#f0eeeb"/>
  <rect x="24" y="40" width="20" height="3" rx="1" fill="#dddbd8"/>
  <rect x="24" y="48" width="20" height="3" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <rect x="24" y="56" width="16" height="3" rx="1" fill="#dddbd8"/>
  <rect x="24" y="64" width="18" height="3" rx="1" fill="#dddbd8"/>
  <rect x="24" y="72" width="14" height="3" rx="1" fill="#dddbd8"/>

  <!-- KPI cards -->
  <rect x="56" y="36" width="36" height="22" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="60" y="40" width="14" height="2" rx="1" fill="#888580" opacity="0.7"/>
  <rect x="60" y="46" width="22" height="5" rx="1" fill="#1a1a1a" opacity="0.5"/>

  <rect x="96" y="36" width="36" height="22" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="100" y="40" width="14" height="2" rx="1" fill="#888580" opacity="0.7"/>
  <rect x="100" y="46" width="22" height="5" rx="1" fill="#1a1a1a" opacity="0.5"/>

  <rect x="136" y="36" width="38" height="22" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="140" y="40" width="14" height="2" rx="1" fill="#888580" opacity="0.7"/>
  <rect x="140" y="46" width="22" height="5" rx="1" fill="#1a1a1a" opacity="0.5"/>

  <!-- Bar chart -->
  <rect x="56" y="64" width="74" height="42" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="60" y="67" width="20" height="2" rx="1" fill="#888580" opacity="0.6"/>
  <!-- Bars -->
  <rect x="63" y="82" width="8" height="18" rx="1" fill="#1a1a1a" opacity="0.2"/>
  <rect x="74" y="74" width="8" height="26" rx="1" fill="#1a1a1a" opacity="0.35"/>
  <rect x="85" y="78" width="8" height="22" rx="1" fill="#1a1a1a" opacity="0.2"/>
  <rect x="96" y="70" width="8" height="30" rx="1" fill="#1a1a1a" opacity="0.5"/>
  <rect x="107" y="75" width="8" height="25" rx="1" fill="#1a1a1a" opacity="0.3"/>
  <!-- X-axis -->
  <rect x="60" y="100" width="64" height="1" rx="0.5" fill="#dddbd8"/>

  <!-- Line chart -->
  <rect x="136" y="64" width="38" height="42" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="140" y="67" width="16" height="2" rx="1" fill="#888580" opacity="0.6"/>
  <polyline points="140,94 147,88 154,91 161,82 168,85 172,79" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Table area -->
  <rect x="56" y="110" width="118" height="16" rx="2" fill="#f0eeeb" stroke="#dddbd8" stroke-width="1"/>
  <rect x="60" y="114" width="30" height="2" rx="1" fill="#888580" opacity="0.4"/>
  <rect x="96" y="114" width="20" height="2" rx="1" fill="#dddbd8"/>
  <rect x="122" y="114" width="14" height="2" rx="1" fill="#dddbd8"/>
  <rect x="142" y="114" width="24" height="2" rx="1" fill="#dddbd8"/>
</svg>
